name: AI Generated Code Coverage

on:

  push:
    branches:
      - main

  workflow_dispatch:

jobs:

  ai-coverage:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python

        uses: actions/setup-python@v5

        with:

          python-version: "3.12"

      - name: Calculate AI Coverage

        run: |

          python scripts/ai_coverage.py
