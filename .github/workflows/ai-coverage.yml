name: AI Coverage Test

on:
  push:
    branches:
      - main

jobs:

  coverage:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run AI Coverage
        run: |
          python scripts/ai_coverage.py
